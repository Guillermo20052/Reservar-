<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva contraseña · Espacios con propósito</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/theme.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <main class="auth-page">
    <div class="auth-wrap">
      <div class="card auth-card">
        <header class="card-head">
          <p class="kicker">Espacios con propósito</p>
          <h1 class="auth-title">Nueva <em>contraseña</em></h1>
          <p class="auth-lede">Elige una contraseña segura para tu cuenta.</p>
        </header>

        <div id="alert" class="alert" hidden></div>

        <form id="form-reset" hidden novalidate method="post" action="." onsubmit="return false">
          <div class="form-group">
            <label for="reset-password">Nueva contraseña</label>
            <div class="password-field">
              <input class="input" id="reset-password" type="password" name="password" autocomplete="new-password" minlength="6" required>
              <button type="button" class="password-toggle" data-target="reset-password" aria-label="Mostrar/ocultar contraseña" aria-pressed="false">
                <svg class="password-toggle-icon password-toggle-show" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="password-toggle-icon password-toggle-hide" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" hidden><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </div>
          <div class="form-group">
            <label for="reset-password-confirm">Confirmar contraseña</label>
            <div class="password-field">
              <input class="input" id="reset-password-confirm" type="password" name="passwordConfirm" autocomplete="new-password" minlength="6" required>
              <button type="button" class="password-toggle" data-target="reset-password-confirm" aria-label="Mostrar/ocultar contraseña" aria-pressed="false">
                <svg class="password-toggle-icon password-toggle-show" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="password-toggle-icon password-toggle-hide" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" hidden><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </div>
          <button type="button" class="btn btn-primary btn-block" id="reset-submit">Guardar contraseña</button>
          <p class="auth-switch"><a class="link-brand" href="index.html">Volver a iniciar sesión</a></p>
        </form>

        <p id="loading-msg" class="auth-lede" style="text-align:center;margin-top:8px">Verificando enlace…</p>
      </div>
    </div>
  </main>

  <script type="module">
    const alertBox = document.getElementById('alert');
    const formReset = document.getElementById('form-reset');
    const loadingMsg = document.getElementById('loading-msg');

    function showAlert(message, type = 'error') {
      alertBox.hidden = false;
      alertBox.textContent = message;
      alertBox.className = `alert alert-${type}`;
    }

    function hideAlert() {
      alertBox.hidden = true;
      alertBox.textContent = '';
    }

    async function handleReset(e) {
      e.preventDefault();
      hideAlert();

      const password = document.getElementById('reset-password').value;
      const confirm = document.getElementById('reset-password-confirm').value;

      if (password.length < 6) {
        showAlert('La contraseña debe tener al menos 6 caracteres.');
        return;
      }
      if (password !== confirm) {
        showAlert('Las contraseñas no coinciden.');
        return;
      }

      const btn = document.getElementById('reset-submit');
      btn.disabled = true;
      try {
        const { updatePassword } = await import('./js/auth.js');
        await updatePassword(password);
        showAlert('Contraseña actualizada. Redirigiendo…', 'success');
        setTimeout(() => { window.location.href = 'home.html'; }, 1200);
      } catch (err) {
        showAlert(err.message || 'No se pudo actualizar la contraseña.');
        btn.disabled = false;
      }
    }

    document.getElementById('reset-submit')?.addEventListener('click', handleReset);
    formReset.addEventListener('submit', handleReset);

    document.querySelectorAll('.password-toggle').forEach((btn) => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.target);
        if (!input) return;
        const show = input.type === 'password';
        input.type = show ? 'text' : 'password';
        btn.setAttribute('aria-pressed', String(show));
        btn.querySelector('.password-toggle-show')?.toggleAttribute('hidden', show);
        btn.querySelector('.password-toggle-hide')?.toggleAttribute('hidden', !show);
      });
    });

    try {
      if (!window.supabase?.createClient) {
        throw new Error('No se pudo cargar Supabase. Comprueba tu conexión e inténtalo de nuevo.');
      }
      const { completeSessionFromUrl } = await import('./js/auth.js');
      const session = await completeSessionFromUrl();
      loadingMsg.hidden = true;
      if (!session) {
        showAlert('El enlace de recuperación no es válido o ya expiró. Solicita uno nuevo desde iniciar sesión.');
        return;
      }
      formReset.hidden = false;
    } catch (err) {
      loadingMsg.hidden = true;
      showAlert(err.message || 'No se pudo verificar el enlace de recuperación.');
    }
  </script>
</body>
</html>
